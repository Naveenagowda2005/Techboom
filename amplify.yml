version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Set dummy DATABASE_URL for Prisma generation during build
        - export DATABASE_URL="postgresql://dummy:dummy@localhost:5432/dummy"
        - npm ci --cache .npm --prefer-offline
        - npx prisma generate
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
      - .npm/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=31536000, immutable'
